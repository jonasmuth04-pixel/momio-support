<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join momio</title>
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:image" content="https://momio.app/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 360px; }
    .logo { font-size: 42px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: rgba(255,255,255,0.6); font-size: 17px; margin-bottom: 40px; line-height: 1.4; }
    .btn { display: block; color: #fff; text-decoration: none; padding: 16px 32px; border-radius: 14px; font-size: 18px; font-weight: 600; margin-bottom: 12px; cursor: pointer; border: none; width: 100%; }
    .btn-primary { background: #b060e0; }
    .check { color: #4ade80; font-size: 15px; margin-bottom: 24px; display: none; }
    .footer { margin-top: 48px; color: rgba(255,255,255,0.3); font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo">momio</p>
    <p class="sub">Your friend invited you to momio — the app that syncs everyone's photos automatically</p>
    <p class="check" id="copied">Referral code copied!</p>
    <a class="btn btn-primary" id="download" href="https://apps.apple.com/app/id6758896961">Download momio</a>
    <p class="footer">Everyone's photos. One album. Automatic.</p>
  </div>
  <script>
    // Extract username from URL path: /ref/username or /ref/username/
    var parts = window.location.pathname.split('/').filter(Boolean);
    var username = parts.length >= 2 ? parts[1] : null;

    if (username) {
      var refCode = 'ref:' + username.toLowerCase();
      navigator.clipboard.writeText(refCode).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = refCode;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
      window.location.replace('https://apps.apple.com/app/id6758896961');
    }
  </script>
</body>
</html>
