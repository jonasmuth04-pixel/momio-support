<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Event - momio</title>
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:image" content="https://momio.app/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 360px; }
    .logo { font-size: 42px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: rgba(255,255,255,0.6); font-size: 17px; margin-bottom: 40px; line-height: 1.4; }
    .btn { display: block; color: #fff; text-decoration: none; padding: 16px 32px; border-radius: 14px; font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .btn-primary { background: #b060e0; }
    .btn-secondary { background: rgba(255,255,255,0.1); }
    .footer { margin-top: 48px; color: rgba(255,255,255,0.3); font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <p class="logo">momio</p>
    <p class="sub">You've been invited to a shared album</p>
    <a class="btn btn-primary" href="https://apps.apple.com/app/id6758896961">Download momio</a>
    <a class="btn btn-secondary" id="openApp" href="#">Open in App</a>
    <p class="footer">Everyone's photos. One album.</p>
  </div>
  <script>
    var token = new URLSearchParams(window.location.search).get('token');
    document.getElementById('openApp').addEventListener('click', function(e) {
      e.preventDefault();
      if (token) {
        window.location = 'momio://join?token=' + encodeURIComponent(token);
        setTimeout(function() {
          window.location = 'https://apps.apple.com/app/id6758896961';
        }, 1500);
      }
    });
  </script>
</body>
</html>
